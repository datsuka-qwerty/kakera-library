server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver.
    # Using variables in proxy_pass causes per-request DNS lookup instead of
    # resolving once at startup — prevents "host not found" if api starts slowly.
    resolver 127.0.0.11 valid=30s;

    # Health check — proxy directly to API (used by external reverse proxies)
    location /health {
        set $api http://api:8080;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Proxy API requests to backend
    location /api/ {
        set $api http://api:8080;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
