<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#6366f1"/>
  <!-- Back card (amber = dramas) -->
  <g transform="rotate(-18, 256, 270)">
    <rect x="166" y="145" width="180" height="250" rx="16" fill="#f59e0b"/>
  </g>
  <!-- Middle card (emerald = movies) -->
  <g transform="rotate(-6, 256, 270)">
    <rect x="166" y="145" width="180" height="250" rx="16" fill="#22c55e"/>
  </g>
  <!-- Front card (white = books) -->
  <g transform="rotate(6, 256, 270)">
    <rect x="166" y="145" width="180" height="250" rx="16" fill="white"/>
    <rect x="192" y="235" width="128" height="11" rx="5" fill="#e0e7ff"/>
    <rect x="192" y="259" width="100" height="11" rx="5" fill="#e0e7ff"/>
    <rect x="192" y="283" width="114" height="11" rx="5" fill="#e0e7ff"/>
  </g>
</svg>
