name: Release

on:
  release:
    types: [created]

jobs:
  android-apk:
    name: Build Android APKs (per architecture)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Patch ExpoModulesCorePlugin for AGP 8.x compatibility
        run: |
          # Comment out `from components.release` which fails in AGP 8.x.
          # Maven publishing is not needed for APK builds.
          FILE=node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
          sed -i 's/from components\.release/\/\/ from components.release/' "$FILE"
          echo "--- patch result ---"
          grep -n "components" "$FILE"

      - name: Generate debug keystore for signing
        run: |
          if [ ! -f apps/mobile/android/app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore apps/mobile/android/app/debug.keystore \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "debug.keystore already exists, skipping generation"
          fi

      - name: Build release APKs (per architecture)
        working-directory: apps/mobile/android
        env:
          NODE_PATH: ${{ github.workspace }}/apps/mobile/node_modules
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APKs with version tag and architecture
        run: |
          TAG="${{ github.event.release.tag_name }}"
          SRC_DIR="apps/mobile/android/app/build/outputs/apk/release"
          ls -la "$SRC_DIR"
          for apk in "$SRC_DIR"/app-*-release.apk; do
            base=$(basename "$apk")
            # app-arm64-v8a-release.apk -> arm64-v8a
            abi=${base#app-}
            abi=${abi%-release.apk}
            cp "$apk" "kakera-library-${TAG}-android-${abi}.apk"
          done
          ls -la kakera-library-${TAG}-android-*.apk

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          files: kakera-library-${{ github.event.release.tag_name }}-android-*.apk
