name: Release

on:
  release:
    types: [created]

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate Android project)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             kakera-library-${TAG}-android.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: kakera-library-${{ github.event.release.tag_name }}-android.apk
