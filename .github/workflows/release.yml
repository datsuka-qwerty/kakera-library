name: Release

on:
  release:
    types: [created]

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Patch ExpoModulesCorePlugin for AGP 8.x compatibility
        run: |
          # Comment out `from components.release` which fails in AGP 8.x.
          # Maven publishing is not needed for APK builds.
          FILE=node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
          sed -i 's/from components\.release/\/\/ from components.release/' "$FILE"
          echo "--- patch result ---"
          grep -n "components" "$FILE"

      - name: Build debug APK
        working-directory: apps/mobile/android
        env:
          NODE_PATH: ${{ github.workspace }}/apps/mobile/node_modules
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             kakera-library-${TAG}-android.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: kakera-library-${{ github.event.release.tag_name }}-android.apk
